version: "3.9"

services:
  fastapi-app:
    build: .
    container_name: fastapi-sqlite-app
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - sqlite_data:/app/app.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local

